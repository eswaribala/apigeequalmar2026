name: Apigee Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

env:
  ORG: ${{ vars.APIGEE_ORG }}
  ENV: ${{ vars.APIGEE_ENV }}
  PROXY_NAME: ${{ vars.APIGEE_PROXY_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify proxy bundle
        run: |
          test -d apiproxy
          zip -r "${PROXY_NAME}.zip" apiproxy

      - name: Import proxy
        id: import_proxy
        shell: bash
        run: |
          set -euo pipefail

          RESPONSE=$(curl -sS -X POST \
            "https://apigee.googleapis.com/v1/organizations/${ORG}/apis?action=import&name=${PROXY_NAME}" \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -F "file=@${PROXY_NAME}.zip")

          echo "$RESPONSE"

          REVISION=$(echo "$RESPONSE" | jq -r '.revision')

          if [ -z "$REVISION" ] || [ "$REVISION" = "null" ]; then
            echo "Failed to get revision from import response"
            exit 1
          fi

          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"

      - name: Deploy proxy
        shell: bash
        run: |
          set -euo pipefail

          curl -sS -X POST \
            "https://apigee.googleapis.com/v1/organizations/${ORG}/environments/${ENV}/apis/${PROXY_NAME}/revisions/${{ steps.import_proxy.outputs.revision }}/deployments?override=true" \
            -H "Authorization: Bearer $(gcloud auth print-access-token)"
